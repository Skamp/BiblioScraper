name: Scrape and Alert

on:
  schedule:
    - cron: '0 8 * * *' # Runs every day at 08:00 UTC
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

concurrency:
  group: scrape-and-update
  cancel-in-progress: false
  
jobs:
  scrape_and_alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 urllib3

      - name: Run Scraper and Export
        env:
          PYTHONIOENCODING: "utf-8"
        run: |
          python scraper.py -scrap -export

      - name: Run Alert script (Telegram)
        env:
          PYTHONIOENCODING: "utf-8"
        run: |
          python alert.py -telegram -bot_token "${{ secrets.TELEGRAM_BOT_TOKEN }}" -user_chat_id "${{ secrets.TELEGRAM_CHAT_ID }}" -url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add courses/database.db js/courses.js
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update course data"
            
            # Fetch latest changes and rebase
            git fetch origin main
            git rebase origin/main || {
              echo "Rebase failed, aborting..."
              git rebase --abort
              exit 1
            }
            
            # Push with lease to prevent accidental overwrites
            git push --force-with-lease origin main
          fi
